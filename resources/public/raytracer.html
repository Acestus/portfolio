<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Unicyclist on a maze — real-time ray traced in Rust + WASM">
  <meta name="theme-color" content="#0a0a2a">
  <meta property="og:title" content="Raytracer — acestus.com">
  <meta property="og:description" content="Unicyclist on a maze — Rust + WASM">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://portfolio.acestus.com/raytracer.html">
  <meta property="og:image" content="https://portfolio.acestus.com/favicon.svg">

  <title>Raytracer — acestus.com</title>
  <link rel="stylesheet" href="/css/shared.css">
  <link rel="stylesheet" href="/css/arcade.css">
  <style>
    .info-bar {
      color: #555; font-family: monospace; font-size: var(--step--2);
      text-align: center; margin-block-start: var(--space-2xs);
    }
    .info-bar span { color: #00ff41; }
    .subtitle { color: #888; text-align: center; margin-block-end: var(--space-s); }
    .subtitle em { color: #00d4ff; font-style: normal; }
  </style>
</head>
<body class="arcade-theme">
  <div id="app">
    <div class="page-shell">
      <main class="main-content">
        <div class="game-wrapper">
          <h1 style="font-family:'Press Start 2P',monospace;color:#00d4ff;font-size:var(--step-2);text-align:center">🏛️ Raytracer</h1>
          <p class="subtitle">A unicyclist on an elevated maze<br>
            Real-time ray tracing · <span style="color:#00ff41">Rust + WASM</span></p>
          <canvas id="canvas" class="game-canvas"></canvas>
          <div class="info-bar">
            <span id="fps"></span>
          </div>
        </div>
        <div class="action-links">
          <a class="action-btn" href="/articles/raytracer.html">📄 Read Article</a>
          <a class="action-btn" href="https://github.com/Acestus/portfolio/tree/main/rust/raytracer" target="_blank" rel="noopener noreferrer">⌨ Source Code</a>
        </div>
      </main>
      <footer class="site-footer"><p>acestus.com — William Weeks-Balconi</p></footer>
    </div>
  </div>
  <script type="module">
    import init, { Raytracer } from '/wasm/raytracer/raytracer.js';
    async function run() {
      await init();
      const canvas = document.getElementById('canvas');
      // create overlay canvas for Minds Eye effects
      const wrapper = canvas.parentElement;
      if (wrapper) wrapper.style.position = wrapper.style.position || 'relative';
      const overlay = document.createElement('canvas');
      overlay.style.position = 'absolute';
      overlay.style.left = '0px';
      overlay.style.top = '0px';
      overlay.style.pointerEvents = 'none';
      overlay.style.zIndex = '10';
      overlay.id = 'minds-eye-overlay';
      if (wrapper) wrapper.appendChild(overlay);
      const octx = overlay.getContext('2d');

      const rt = new Raytracer(canvas);
      // knock rider over on click/tap — send normalized screen vector and pixel coords
      canvas.addEventListener('click', (e)=>{
        const rect = canvas.getBoundingClientRect();
        const cx = e.clientX - rect.left;
        const cy = e.clientY - rect.top;
        const sx = (cx - canvas.width/2) / (canvas.width/2);
        const sy = (cy - canvas.height/2) / (canvas.height/2);
        rt.tap(performance.now()/1000, sx, sy, cx, cy);
      });
      canvas.addEventListener('touchstart', (e)=>{ e.preventDefault(); const t = e.touches[0]; const rect = canvas.getBoundingClientRect(); const cx = t.clientX - rect.left; const cy = t.clientY - rect.top; const sx = (cx - canvas.width/2) / (canvas.width/2); const sy = (cy - canvas.height/2) / (canvas.height/2); rt.tap(performance.now()/1000, sx, sy, cx, cy); }, {passive:false});
      const fpsEl = document.getElementById('fps');

      function resizeOverlay(){
        const rect = canvas.getBoundingClientRect();
        const wrapRect = wrapper.getBoundingClientRect();
        const cssW = rect.width || canvas.clientWidth || 320;
        const cssH = rect.height || canvas.clientHeight || 240;
        const dpr = window.devicePixelRatio || 1;
        // position overlay relative to wrapper
        overlay.style.left = (rect.left - wrapRect.left) + 'px';
        overlay.style.top = (rect.top - wrapRect.top) + 'px';
        // set CSS size
        overlay.style.width = cssW + 'px';
        overlay.style.height = cssH + 'px';
        // set backing store size for high-DPI
        overlay.width = Math.max(1, Math.round(cssW * dpr));
        overlay.height = Math.max(1, Math.round(cssH * dpr));
        // scale drawing operations so coordinates are in CSS pixels
        if (octx) { octx.setTransform(dpr,0,0,dpr,0,0); }
      }
      // sync sizes if needed
      resizeOverlay();
      // Observe size changes to canvas and reposition overlay
      const mo = new ResizeObserver(()=>resizeOverlay());
      mo.observe(canvas);
      window.addEventListener('resize', resizeOverlay);

      function animateMindsEye(cx, cy){
        if (!octx) return;
        const rect = canvas.getBoundingClientRect();
        const cssW = rect.width || canvas.clientWidth;
        const cssH = rect.height || canvas.clientHeight;
        const start = performance.now();
        const duration = 1600;
        const slices = 7;
        function frame(){
          const now = performance.now();
          const t = (now - start) / duration;
          // clear using CSS pixel coords
          octx.save();
          octx.globalCompositeOperation = 'source-over';
          octx.clearRect(0,0,cssW, cssH);
          octx.restore();
          if (t >= 1.0) return;
          octx.globalCompositeOperation = 'lighter';
          for (let i=0;i<slices;i++){
            const angle = i*(Math.PI*2)/slices + t*4.0;
            octx.save();
            octx.translate(cx, cy);
            octx.rotate(angle);
            octx.beginPath();
            octx.moveTo(0,0);
            octx.arc(0,0, Math.min(cssW, cssH)*0.4, -0.35, 0.35);
            octx.closePath();
            const hue = (i*360/slices + t*360) % 360;
            octx.fillStyle = `hsla(${hue},90%,60%,${0.25*(1-t)})`;
            octx.fill();
            octx.restore();
          }
          // neon ring
          const maxR = Math.max(cssW, cssH);
          const r = maxR * 0.25 * (0.5 + t);
          octx.lineWidth = 8 * (1 - t);
          octx.strokeStyle = `rgba(0,255,65,${1 - t})`;
          octx.beginPath(); octx.arc(cx, cy, r, 0, Math.PI*2); octx.stroke();
          requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
      }

      // click/touch handler: keep existing RT tap (if exported) and also run Minds Eye overlay
      canvas.addEventListener('click', (e)=>{
        const rect = canvas.getBoundingClientRect();
        const cx = e.clientX - rect.left;
        const cy = e.clientY - rect.top;
        const sx = (cx - canvas.width/2) / (canvas.width/2);
        const sy = (cy - canvas.height/2) / (canvas.height/2);
        try { if (rt && rt.tap) rt.tap(performance.now()/1000, sx, sy, cx, cy); } catch (err) { /* ignore if tap not exported */ }
        animateMindsEye(cx, cy);
      });
      canvas.addEventListener('touchstart', (e)=>{ e.preventDefault(); const t = e.touches[0]; const rect = canvas.getBoundingClientRect(); const cx = t.clientX - rect.left; const cy = t.clientY - rect.top; const sx = (cx - canvas.width/2) / (canvas.width/2); const sy = (cy - canvas.height/2) / (canvas.height/2); try { if (rt && rt.tap) rt.tap(performance.now()/1000, sx, sy, cx, cy); } catch (err){} animateMindsEye(cx, cy); }, {passive:false});

      let frames = 0, fpsTime = 0, last = performance.now();
      function loop(now) {
        const dt = (now - last) / 1000;
        last = now;
        frames++; fpsTime += dt;
        if (fpsTime > 1.0) {
          fpsEl.textContent = `${(frames/fpsTime).toFixed(1)} fps · 320×240 · Rust+WASM`;
          frames = 0; fpsTime = 0;
        }
        rt.render_frame(now / 1000);
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    }
    run();
  </script>
  <script src="/js/nav.js"></script>
</body>
</html>
