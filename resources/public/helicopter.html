<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Cloud Lift — migrate workloads to the cloud, one rescue at a time">
  <meta name="theme-color" content="#0a0a2a">
  <meta property="og:title" content="Cloud Lift — acestus.com">
  <meta property="og:description" content="Cloud Lift — migrate workloads to the cloud, one rescue at a time">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://portfolio.acestus.com/helicopter.html">
  <meta property="og:image" content="https://portfolio.acestus.com/favicon.svg">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>Cloud Lift — acestus.com</title>
  <link rel="stylesheet" href="/css/shared.css">
  <link rel="stylesheet" href="/css/arcade.css">
</head>
<body class="arcade-theme">
<header class="site-nav" role="banner">
  <a class="site-name" href="/">acestus.com</a>
  <nav role="navigation" aria-label="Main">
    <button class="nav-toggle" aria-controls="main-nav" aria-expanded="false">☰</button>
    <div class="nav-links" id="main-nav">
      <a class="nav-link" href="/">Portfolio</a>
    </div>
  </nav>
</header>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var toggle = document.querySelector('.nav-toggle');
  var links = document.getElementById('main-nav');
  if (!toggle || !links) return;

  toggle.addEventListener('click', function() {
    var isOpen = links.classList.toggle('open');
    toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  });

  links.querySelectorAll('a').forEach(function(a) {
    a.addEventListener('click', function() {
      links.classList.remove('open');
      toggle.setAttribute('aria-expanded', 'false');
    });
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      links.classList.remove('open');
      toggle.setAttribute('aria-expanded', 'false');
    }
  });
});
</script>

  <div id="app"></div>
  <script src="/js/helicopter/main.js"></script>
  <script src="/js/nav.js"></script>
</body>
</html>
