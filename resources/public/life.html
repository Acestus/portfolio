<body class="arcade-theme">
<header class="site-nav" role="banner">
  <a class="site-name" href="/">acestus.com</a>
  <nav role="navigation" aria-label="Main">
    <button class="nav-toggle" aria-controls="main-nav" aria-expanded="false">☰</button>
    <div class="nav-links" id="main-nav">
      <a class="nav-link" href="/">Portfolio</a>
    </div>
  </nav>
</header>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var toggle = document.querySelector('.nav-toggle');
  var links = document.getElementById('main-nav');
  if (!toggle || !links) return;

  toggle.addEventListener('click', function() {
    var isOpen = links.classList.toggle('open');
    toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  });

  links.querySelectorAll('a').forEach(function(a) {
    a.addEventListener('click', function() {
      links.classList.remove('open');
      toggle.setAttribute('aria-expanded', 'false');
    });
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      links.classList.remove('open');
      toggle.setAttribute('aria-expanded', 'false');
    }
  });
});
</script>

  <div id="app">
    <div class="page-shell">
      <main class="main-content">
        <div class="game-wrapper">
          <h1 style="font-family:'Press Start 2P',monospace;color:#00d4ff;font-size:var(--step-2);text-align:center">🧬 Game of Life</h1>
          <p style="color:#888;text-align:center;margin-block-end:var(--space-m)">200×150 grid · 30,000 cells · Click to toggle cells · Gosper glider gun seeded · <span style="color:#00ff41">Rust + WASM</span></p>
          <canvas id="canvas" class="game-canvas"></canvas>
          <p id="stats" style="color:#666;font-family:monospace;font-size:var(--step--2)"></p>
        </div>
        <div class="action-links">
          <a class="action-btn" href="/articles/game-of-life.html">📄 Read Article</a>
          <a class="action-btn" href="https://github.com/Acestus/portfolio/tree/main/rust/life" target="_blank" rel="noopener noreferrer">⌨ Source Code</a>
        </div>
      </main>
      <footer class="site-footer"><p>acestus.com — William Weeks-Balconi</p></footer>
    </div>
  </div>
  <script type="module">
    import init, { Life } from '/wasm/life/life.js';
    async function run() {
      await init();
      const canvas = document.getElementById('canvas');
      const wrapper = canvas.parentElement || document.body;
      if (wrapper) wrapper.style.position = wrapper.style.position || 'relative';
      // overlay canvas for neon ripple
      const overlay = document.createElement('canvas');
      overlay.style.position = 'absolute';
      overlay.style.left = '0px';
      overlay.style.top = '0px';
      overlay.style.pointerEvents = 'none';
      overlay.style.zIndex = '10';
      wrapper.appendChild(overlay);
      const octx = overlay.getContext('2d');

      const life = new Life(canvas);
      const statsEl = document.getElementById('stats');

      function resizeOverlay(){
        const rect = canvas.getBoundingClientRect();
        const wrapRect = wrapper.getBoundingClientRect();
        const cssW = rect.width || canvas.clientWidth || 800;
        const cssH = rect.height || canvas.clientHeight || 600;
        const dpr = window.devicePixelRatio || 1;
        overlay.style.left = (rect.left - wrapRect.left) + 'px';
        overlay.style.top = (rect.top - wrapRect.top) + 'px';
        overlay.style.width = cssW + 'px';
        overlay.style.height = cssH + 'px';
        overlay.width = Math.max(1, Math.round(cssW * dpr));
        overlay.height = Math.max(1, Math.round(cssH * dpr));
        if (octx) { octx.setTransform(dpr,0,0,dpr,0,0); }
      }
      resizeOverlay();
      const mo = new ResizeObserver(resizeOverlay);
      mo.observe(canvas);
      window.addEventListener('resize', resizeOverlay);

      function animateRipple(cx, cy){
        if (!octx) return;
        const rect = canvas.getBoundingClientRect();
        const cssW = rect.width || canvas.clientWidth;
        const cssH = rect.height || canvas.clientHeight;
        const start = performance.now();
        const duration = 1000;
        function frame(){
          const now = performance.now();
          const t = (now - start) / duration;
          octx.clearRect(0,0,cssW, cssH);
          if (t >= 1.0) return;
          const r = Math.max(cssW, cssH) * 0.25 * t + 4;
          const alpha = Math.max(1.0 - t, 0);
          octx.lineWidth = 6 * (1 - t);
          octx.strokeStyle = `rgba(0,255,65,${alpha})`;
          octx.beginPath(); octx.arc(cx, cy, r, 0, Math.PI*2); octx.stroke();
          requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
      }

      canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const sx = canvas.width / rect.width;
        const sy = canvas.height / rect.height;
        const cx = (e.clientX - rect.left);
        const cy = (e.clientY - rect.top);
        life.toggle_at(cx * sx, cy * sy);
        animateRipple(cx, cy);
      });
      canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const t = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const sx = canvas.width / rect.width;
        const sy = canvas.height / rect.height;
        const cx = (t.clientX - rect.left);
        const cy = (t.clientY - rect.top);
        life.toggle_at(cx * sx, cy * sy);
        animateRipple(cx, cy);
      }, { passive: false });

      let last = performance.now(), frames = 0, fpsTime = 0;
      function loop(now) {
        const dt = (now - last) / 1000;
        last = now;
        frames++; fpsTime += dt;
        if (fpsTime > 0.5) {
          const fps = (frames/fpsTime).toFixed(0);
          statsEl.textContent = `Gen ${life.generation()} · Pop ${life.population()} · ${fps} fps · Rust WASM`;
          frames = 0; fpsTime = 0;
        }
        life.tick();
        life.render();
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    }
    run();
  </script>
  <script src="/js/nav.js"></script>
</body>
