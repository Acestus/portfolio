name: Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-portfolio
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  RESOURCE_GROUP_NAME: rg-portfolio-dev
  SWA_NAME: swa-portfolio-dev-scus-001

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Rust + wasm-pack
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install dependencies
        run: npm ci

      - name: Build Rust WASM crates
        run: |
          wasm-pack build rust/particles --target web --out-dir ../../resources/public/wasm/particles --no-typescript
          wasm-pack build rust/raytracer --target web --out-dir ../../resources/public/wasm/raytracer --no-typescript
          wasm-pack build rust/life --target web --out-dir ../../resources/public/wasm/life --no-typescript

      - name: Compile all builds
        run: npx shadow-cljs compile hub platformer invaders matcher breakout helicopter fabric policy logs iac platform repl architecture agentic enterprise-pricing enterprise-m365

      - name: Verify output artifacts
        run: |
          for build in hub platformer invaders matcher breakout helicopter fabric policy logs iac platform repl architecture agentic enterprise/pricing enterprise/m365; do
            test -f "resources/public/js/${build}/main.js" || { echo "❌ Missing: ${build}/main.js"; exit 1; }
            echo "✅ ${build}/main.js exists"
          done

      - name: Release build
        run: npm run release

      # ── Azure login ────────────────────────────────────────────────
      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      # ── Ensure resource group exists ───────────────────────────────
      - name: Ensure resource group
        run: |
          az group create \
            --name "$RESOURCE_GROUP_NAME" \
            --location southcentralus \
            --tags ManagedBy=https://github.com/Acestus/portfolio CreatedBy=acestus || true

      # ── Infrastructure ─────────────────────────────────────────────
      - name: Deploy Bicep template
        id: infra
        run: |
          RESULT=$(az deployment group create \
            --name "deploy-portfolio-$(date +%s)" \
            --resource-group "$RESOURCE_GROUP_NAME" \
            --template-file infra/portfolio/main.bicep \
            --query 'properties.outputs' -o json)
          TOKEN=$(echo "$RESULT" | jq -r '.deploymentToken.value')
          echo "::add-mask::$TOKEN"
          echo "SWA_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "hostname=$(echo "$RESULT" | jq -r '.defaultHostname.value')" >> "$GITHUB_OUTPUT"

      # ── Deploy to Static Web App ───────────────────────────────────
      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: resources/public
          skip_app_build: true

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** dev" >> $GITHUB_STEP_SUMMARY
          echo "**Resource Group:** $RESOURCE_GROUP_NAME" >> $GITHUB_STEP_SUMMARY
          echo "**Hostname:** ${{ steps.infra.outputs.hostname }}" >> $GITHUB_STEP_SUMMARY
