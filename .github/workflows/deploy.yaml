name: Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Rust + wasm-pack
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install dependencies
        run: npm ci

      - name: Build Rust WASM crates
        run: |
          wasm-pack build rust/particles --target web --out-dir ../../resources/public/wasm/particles --no-typescript
          wasm-pack build rust/raytracer --target web --out-dir ../../resources/public/wasm/raytracer --no-typescript
          wasm-pack build rust/life --target web --out-dir ../../resources/public/wasm/life --no-typescript

      - name: Compile all builds
        run: npx shadow-cljs compile hub platformer invaders matcher breakout fabric policy logs iac platform repl architecture

      - name: Verify output artifacts
        run: |
          for build in hub platformer invaders matcher breakout fabric policy logs iac platform repl architecture; do
            test -f "resources/public/js/${build}/main.js" || { echo "❌ Missing: ${build}/main.js"; exit 1; }
            echo "✅ ${build}/main.js exists"
          done

      - name: Release build
        run: npm run release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-build
          path: resources/public/
          retention-days: 1

  deploy:
    name: Deploy to Azure Static Web Apps
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: portfolio-build
          path: resources/public/

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: resources/public
          skip_app_build: true
